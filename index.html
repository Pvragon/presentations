<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pvragon Presentations</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #112328;
            --bg-teal: #1E4958;
            --accent-orange: #E7511F;
            --text-main: #F8FAFC;
            --text-muted: #DEEAEF;
            --text-subtle: #5E767D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans', sans-serif; }

        body {
            background: #080e10;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated wave background — matches presentation template */
        #wave-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Glassmorphism card */
        .card {
            width: 92%;
            max-width: 720px;
            background: linear-gradient(160deg, rgba(17, 35, 40, 0.97) 0%, rgba(12, 24, 28, 0.99) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(248, 250, 252, 0.08);
            border-radius: 24px;
            box-shadow:
                0 25px 60px -12px rgba(0, 0, 0, 0.7),
                inset 0 1px 0 rgba(248, 250, 252, 0.05);
            position: relative;
            z-index: 10;
            padding: 3rem 3rem 2.5rem;
            overflow: hidden;
        }

        /* Interior ambient glows */
        .card::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(30, 73, 88, 0.35) 0%, rgba(30, 73, 88, 0.08) 40%, transparent 70%);
            top: -20%; right: -15%;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: drift-a 14s ease-in-out infinite alternate;
        }

        .card::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(231, 81, 31, 0.07) 0%, rgba(231, 81, 31, 0.02) 40%, transparent 70%);
            bottom: -15%; left: -10%;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: drift-b 18s ease-in-out infinite alternate;
        }

        @keyframes drift-a {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-60px, 50px) scale(1.2); }
            66% { transform: translate(-30px, 80px) scale(1.1); }
            100% { transform: translate(30px, -30px) scale(0.95); }
        }

        @keyframes drift-b {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -40px) scale(1.15); }
            66% { transform: translate(70px, -20px) scale(1.25); }
            100% { transform: translate(-30px, 20px) scale(1.05); }
        }

        /* Content sits above glows */
        .card-content {
            position: relative;
            z-index: 5;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 0.3rem;
        }

        h1 span { color: var(--accent-orange); }

        .subtitle {
            color: var(--text-subtle);
            font-size: 1rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        h2 {
            font-size: 0.85rem;
            color: var(--text-subtle);
            font-weight: 600;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .deck-list { list-style: none; }
        .deck-list li { margin-bottom: 0.7rem; }

        .deck-list a {
            display: block;
            padding: 1.1rem 1.5rem;
            background: rgba(248, 250, 252, 0.03);
            border: 1px solid rgba(248, 250, 252, 0.08);
            border-radius: 14px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Subtle left accent bar on hover */
        .deck-list a::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 3px; height: 100%;
            background: var(--accent-orange);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .deck-list a:hover {
            background: rgba(248, 250, 252, 0.06);
            border-color: rgba(231, 81, 31, 0.25);
            color: var(--text-main);
            transform: translateX(4px);
            box-shadow: 0 4px 20px -6px rgba(231, 81, 31, 0.15);
        }

        .deck-list a:hover::before {
            opacity: 1;
        }

        .deck-list a .deck-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .deck-list a .deck-title i {
            font-size: 0.9rem;
            color: var(--accent-orange);
            opacity: 0;
            transform: translateX(-6px);
            transition: all 0.3s ease;
        }

        .deck-list a:hover .deck-title i {
            opacity: 1;
            transform: translateX(0);
        }

        .deck-list a .deck-desc {
            display: block;
            font-size: 0.85rem;
            color: var(--text-subtle);
            font-weight: 400;
            margin-top: 0.25rem;
        }

        .footer {
            margin-top: 2.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(248, 250, 252, 0.06);
            font-size: 0.8rem;
            color: var(--text-subtle);
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .card { padding: 2rem 1.5rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <canvas id="wave-bg"></canvas>

    <div class="card">
        <div class="card-content">
            <h1>Pvragon <span>Presentations</span></h1>
            <p class="subtitle">prez.pvra.gon</p>

            <h2>Echo1 V2 Kickoff</h2>
            <ul class="deck-list">
                <li><a href="echo1/kickoff-company-intro.html">
                    <span class="deck-title">Company Intro <i class="fa-solid fa-arrow-right"></i></span>
                    <span class="deck-desc">Ride Care context + Pvragon orientation</span>
                </a></li>
                <li><a href="echo1/kickoff-team-structure.html">
                    <span class="deck-title">Team Structure <i class="fa-solid fa-arrow-right"></i></span>
                    <span class="deck-desc">Pod model, roles & responsibilities</span>
                </a></li>
                <li><a href="echo1/meeting3-roadmap.html">
                    <span class="deck-title">Roadmap & Engineering Plan <i class="fa-solid fa-arrow-right"></i></span>
                    <span class="deck-desc">Timeline, milestones, and month 1 weekly plan</span>
                </a></li>
            </ul>

            <div class="footer">Pvragon &middot; Auto-deployed via Vercel</div>
        </div>
    </div>

    <!-- Animated wave background -->
    <script>
        (function() {
            const canvas = document.getElementById('wave-bg');
            const ctx = canvas.getContext('2d');
            let w, h, time = 0;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function drawWave(yBase, amplitude, wavelength, speed, color) {
                ctx.beginPath();
                ctx.moveTo(0, h);
                for (let x = 0; x <= w; x += 2) {
                    const y = yBase
                        + Math.sin((x / wavelength) + (time * speed)) * amplitude
                        + Math.sin((x / (wavelength * 0.6)) + (time * speed * 0.7)) * (amplitude * 0.4)
                        + Math.cos((x / (wavelength * 1.8)) + (time * speed * 0.3)) * (amplitude * 0.25);
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.lineTo(w, h);
                ctx.lineTo(0, h);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
            }

            function draw() {
                time += 0.008;
                ctx.clearRect(0, 0, w, h);

                drawWave(h * 0.72, 30, 400, 0.4, 'rgba(30, 73, 88, 0.12)');
                drawWave(h * 0.78, 22, 320, 0.6, 'rgba(30, 73, 88, 0.08)');
                drawWave(h * 0.85, 18, 500, 0.35, 'rgba(231, 81, 31, 0.04)');
                drawWave(h * 0.88, 15, 280, 0.8, 'rgba(30, 73, 88, 0.06)');

                ctx.save();
                ctx.beginPath();
                for (let x = 0; x <= w; x += 2) {
                    const y = h * 0.18
                        + Math.sin((x / 500) + (time * 0.25)) * 20
                        + Math.cos((x / 350) + (time * 0.15)) * 12;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.lineTo(w, 0);
                ctx.lineTo(0, 0);
                ctx.closePath();
                ctx.fillStyle = 'rgba(30, 73, 88, 0.08)';
                ctx.fill();
                ctx.restore();

                requestAnimationFrame(draw);
            }

            draw();
        })();
    </script>
</body>
</html>
